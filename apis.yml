    name: SlashID API
    description: >
      The SlashID REST API provides endpoints for identity management, user
      authentication, token lifecycle, persons management, credentials,
      groups, RBAC, organizations, webhooks, OAuth2/OIDC, and workflow
      automation. Authentication is via API key (SlashID-API-Key header),
      OAuth2 client credentials, or Bearer token.
