aid: slashid
name: SlashID
description: >
  SlashID is a developer-first identity platform that provides REST APIs for
  passwordless authentication, multi-factor authentication, passkeys, and
  comprehensive user management across web and mobile applications. The platform
  offers three core modules: Identity Management for building authentication
  and user lifecycle flows, Identity Protection for monitoring and remediating
  security events across human and non-human identities, and Gate for
  identity-based traffic authorization at the API and workload edge. SlashID
  supports multiple authentication factors including magic links, biometrics,
  TOTP, and SSO, with global availability and an event-driven architecture.
  The service publishes an OpenAPI 1.1 specification and offers JavaScript,
  React, and Remix SDKs alongside API-key and OAuth2/OIDC authentication.
