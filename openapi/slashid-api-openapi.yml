            - name
          description: |-
            The scopes of access granted by the access_token expressed as a list of space-delimited, case-sensitive strings.

            Note: scopes `openid`, `email`, `name` are always requested.
        private_key:
          type: string
          description: An ES256 private key downloaded from your Apple developer account in PKCS8 format.
        team_id:
          type: string
          description: The 10-character Team ID associated with your Apple developer account. This will be used as the issuer claim in client secret JWTs.
        key_id:
          type: string
          description: A 10-character key identifier generated for the Account and Organizational Data Sharing private key associated with your developer account.
        secret_lifetime:
          type: string
          description: |
            The lifetime of each generated client secret. The value provided should be a string that can be parsed as a [Golang `time.Duration`](https://pkg.go.dev/time#Duration); for example, "1m" (one minute), "24h" (24 hours). The lifetime may not be less than 5 minutes (300 seconds), and may not be more than 15,777,000 seconds (6 months). If not set, defaults to 30 days.
