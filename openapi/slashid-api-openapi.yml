        If a custom token template was previously created, it will be returned.
        Otherwise the default template is returned.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponseBase"
                  - type: object
                    properties:
                      result:
                        $ref: "#/components/schemas/TokenTemplate"
                    required:
                      - result
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      operationId: PutOrganizationsConfigTokenTemplate
      x-rbac-enabled: true
      x-rbac-allowed-groups: admin
      tags:
        - Identity Management
        - Organization Token Template
        - RBAC
      parameters:
        - $ref: "#/components/parameters/RequiredConsistencyHeader"
        - $ref: "#/components/parameters/RequiredConsistencyTimeoutHeader"
      summary: Modify the organization's token template
      description: |
        Sets the token template for your organization. If a template already exists it will be overwritten and cannot
        be retrieved.

        The template must conform to the [mustache template syntax](https://mustache.github.io/mustache.5.html). The following tags are available:
          - `{{ organization }}`: provides information on the organization. Renders to
            ```json
            {
              "id": "00000000-0000-0000-0000-000000000000",
              "name": "Your Org Name",
              "ancestors": [
                {
                  "id": "00000000-0000-0000-0000-111111111111",
                  "name": "Parent Name"
                },
                ...
              ]
            }
            ```

            The following sub-tags are available:
            - `{{ organization.id }}`: the ID of the organization. Renders to `00000000-0000-0000-0000-000000000000`
            - `{{ organization.name }}`: the name of the organization. Renders to `Your Org Name`
            - `{{ organization.ancestors }}`: the list of ancestor organizations, starting from the parent up to the root. Renders to
              ```json
              [{"id": "00000000-0000-0000-0000-111111111111", "name": "Parent Name"}, ...]
              ```
            - `{{ person.permissions }}`: provides information on the person's permissions (additional and from roles). Renders to
              ```json
              [
                "permission1",
                "permission2"
              ]
              ```
      requestBody:
        description: The new content of the token template
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenTemplate"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "400":
          $ref: "#/components/responses/BadRequest"
        "408":
          $ref: "#/components/responses/Timeout"
