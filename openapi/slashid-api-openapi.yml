      properties:
        token:
          type: string
        token_type_hint:
          $ref: "#/components/schemas/OAuth2TokenType"
        scope:
          $ref: "#/components/schemas/OAuth2ScopesSpaceDelimited"
    IntrospectOAuth2TokenResponse:
      type: object
      required:
        - active
      properties:
        active:
          type: boolean
          description: Whether the token is active. False for invalid and expired tokens, and tokens that are not granted the scopes specified in the request.
        client_id:
          type: string
          description: The client ID used to create this token. Only included if `active` is `true`.
        exp:
          type: integer
          description: The expiration timestamp of the token. Only included if `active` is `true`.
        iat:
          type: integer
          description: The timestamp when the token was issued. Only included if `active` is `true`.
        scope:
          type: string
          description: The scope granted to the token. Only included if `active` is `true`.
    MintOAuth2TokensRequest:
      type: object
      required:
        - person_id
        - client_id
      properties:
        person_id:
          $ref: "#/components/schemas/PersonID"
        client_id:
          $ref: "#/components/schemas/OAuth2ClientID"
        scopes:
          type: array
          items:
            type: string
        custom_claims:
          type: object
          additionalProperties: true
    MintOAuth2TokensResponse:
      type: object
      required:
        - access_token
      properties:
        id_token:
          type: string
        access_token:
          type: string
        refresh_token:
          type: string
    UserinfoOAuth2Response:
      type: object
      required:
        - sub
        - iss
        - aud
        - org_id
      properties:
        sub:
          type: string
          description: The subject granted to the token, as a person ID.
        iss:
          type: string
          description: The access token issuer.
        aud:
          type: string
          description: The audience granted to th token, that is, the OAuth2 client ID.
        org_id:
          type: string
          description: The SlashID organization ID granted to the token.
        email:
          type: string
          description: The email address of the person. Only present if the authorization request included scope `email`.
        email_verified:
          type: boolean
          description: Is `true` if the ownership of the email address was verified. `false` otherwise.
        phone_number:
          type: string
          description: The phone number of the person. Only present if the authorization request included scope `phone`.
        phone_number_verified:
          type: boolean
          description: Is `true` if the ownership of the phone number was verified. `false` otherwise.
        username:
          type: string
          description: The username of the person. Only present if the authorization request included scope `username`.
    TestEventsPostReq:
      type: array
      items:
        $ref: "#/components/schemas/TestEventsSpecification"
    TestEventsPostResponse:
      type: array
      items:
        $ref: "#/components/schemas/TestEvent"
    OpenIDConfig:
      type: object
      required:
        - issuer
        - authorization_endpoint
        - token_endpoint
        - jwks_uri
        - response_types_supported
        - subject_types_supported
        - id_token_signing_alg_values_supported
      properties:
        issuer:
          type: string
          description: URL using the https scheme with no query or fragment components that the OP asserts as its Issuer Identifier. If Issuer discovery is supported (see Section 2), this value MUST be identical to the issuer value returned by WebFinger. This also MUST be identical to the iss Claim value in ID Tokens issued from this Issuer.
        authorization_endpoint:
          type: string
          description: URL of the OP's OAuth 2.0 Authorization Endpoint. This URL MUST use the https scheme and MAY contain port, path, and query parameter components.
        token_endpoint:
          type: string
          description: URL of the OP's OAuth 2.0 Token Endpoint [OpenID.Core]. This is REQUIRED unless only the Implicit Flow is used. This URL MUST use the https scheme and MAY contain port, path, and query parameter components.
        userinfo_endpoint:
          type: string
          description: URL of the OP's UserInfo Endpoint [OpenID.Core]. This URL MUST use the https scheme and MAY contain port, path, and query parameter components.
        jwks_uri:
          type: string
          description: URL of the OP's JWK Set [JWK] document, which MUST use the https scheme. This contains the signing key(s) the RP uses to validate signatures from the OP. The JWK Set MAY also contain the Server's encryption key(s), which are used by RPs to encrypt requests to the Server. When both signing and encryption keys are made available, a use (public key use) parameter value is REQUIRED for all keys in the referenced JWK Set to indicate each key's intended usage. Although some algorithms allow the same key to be used for both signatures and encryption, doing so is NOT RECOMMENDED, as it is less secure. The JWK x5c parameter MAY be used to provide X.509 representations of keys provided. When used, the bare key values MUST still be present and MUST match those in the certificate. The JWK Set MUST NOT contain private or symmetric key values.
        registration_endpoint:
          type: string
          description: URL of the OP's Dynamic Client Registration Endpoint [OpenID.Registration], which MUST use the https scheme.
        scopes_supported:
          type: array
          items:
            type: string
          description: JSON array containing a list of the OAuth 2.0 scope values that this server supports. The server MUST support the openid scope value. Servers MAY choose not to advertise some supported scope values even when this parameter is used, although those defined in [OpenID.Core] SHOULD be listed, if supported.
        response_types_supported:
          type: array
          items:
            type: string
          description: JSON array containing a list of the OAuth 2.0 response_type values that this OP supports. Dynamic OpenID Providers MUST support the code, id_token, and the id_token token Response Type values.
        grant_types_supported:
          type: array
          items:
            type: string
          description: JSON array containing a list of the OAuth 2.0 Grant Type values that this OP supports. Dynamic OpenID Providers MUST support the authorization_code and implicit Grant Type values and MAY support other Grant Types. If omitted, the default value is ["authorization_code", "implicit"].
        acr_values_supported:
          type: array
          items:
            type: string
          description: JSON array containing a list of the Authentication Context Class References that this OP supports.
        subject_types_supported:
          type: array
          items:
            type: string
          description: JSON array containing a list of the Subject Identifier types that this OP supports. Valid types include pairwise and public.
        id_token_signing_alg_values_supported:
          type: array
          items:
            type: string
          description: JSON array containing a list of the JWS signing algorithms (alg values) supported by the OP for the ID Token to encode the Claims in a JWT [JWT]. The algorithm RS256 MUST be included. The value none MAY be supported but MUST NOT be used unless the Response Type used returns no ID Token from the Authorization Endpoint (such as when using the Authorization Code Flow).
        token_endpoint_auth_methods_supported:
          type: array
          items:
            type: string
          description: JSON array containing a list of Client Authentication methods supported by this Token Endpoint. The options are client_secret_post, client_secret_basic, client_secret_jwt, and private_key_jwt, as described in Section 9 of OpenID Connect Core 1.0 [OpenID.Core]. Other authentication methods MAY be defined by extensions. If omitted, the default is client_secret_basic -- the HTTP Basic Authentication Scheme specified in Section 2.3.1 of OAuth 2.0 [RFC6749].
        claims_supported:
          type: array
          items:
            type: string
          description: JSON array containing a list of the Claim Names of the Claims that the OpenID Provider MAY be able to supply values for. Note that for privacy or other reasons, this might not be an exhaustive list.
    WorkflowCreateRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Workflow name
          minLength: 1
          maxLength: 255
        description:
          type: string
          description: Workflow description
          maxLength: 1000
    Workflow:
      type: object
      required:
        - kind
        - id
        - org_id
        - name
        - status
        - created_by
        - created_at
        - updated_by
        - updated_at
        - execution_count
        - success_count
        - failure_count
        - latest_configuration_version
      properties:
        kind:
          type: string
          enum:
            - workflow
            - workflow_with_configuration
          description: |
            Discriminator for the GET /workflows/{id} response variant.
            `workflow` is returned when `include_configuration=false`;
            `workflow_with_configuration` when the latest version is bundled
            into the response. The enum lists both values intentionally so
            the schema composition `WorkflowWithConfiguration = allOf
            [Workflow, WorkflowConfiguration]` doesn't produce an
            unsatisfiable enum constraint; the discriminator on the
            endpoint's `oneOf` does the runtime dispatch. Required so the
            typescript-fetch generator emits switch-based dispatch (needed
            since openapi-generator-cli v7 — see PR #5928) instead of
            order-sensitive `instanceOf` checks that silently drop the
            configuration fields when both schemas overlap.
        id:
          type: string
          description: Unique workflow identifier
        org_id:
          type: string
          description: Organization ID
        name:
          type: string
          description: Workflow name
          minLength: 1
          maxLength: 255
        description:
          type: string
          description: Workflow description
          maxLength: 1000
        status:
          $ref: "#/components/schemas/WorkflowStatus"
        created_by:
          type: string
          description: User ID who created the workflow
        created_at:
          type: string
          format: date-time
          description: Workflow creation timestamp
        updated_by:
          type: string
          description: User ID who last updated the workflow
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp
        activated_at:
          type: string
          format: date-time
          description: When workflow was first activated
        paused_at:
          type: string
          format: date-time
          description: When workflow was paused
        last_executed_at:
          type: string
          format: date-time
          description: Last execution timestamp
        execution_count:
          type: integer
          description: Total execution count
          minimum: 0
        success_count:
          type: integer
          description: Successful execution count
          minimum: 0
        failure_count:
          type: integer
          description: Failed execution count
          minimum: 0
        latest_configuration_id:
          type: string
          description: ID of the latest configuration version
        latest_configuration_version:
          type: integer
          description: Latest configuration version number
          minimum: 0
    WorkflowStatus:
      type: string
      enum:
        - draft
        - active
        - paused
        - deleted
      description: Current state of a workflow
    WorkflowDataInputType:
      type: string
      enum:
        - detection
        - lifecycle
        - uar_finding
        - cypher_query
      description: Type of data input for workflow
    WorkflowWithConfiguration:
      allOf:
        - $ref: "#/components/schemas/Workflow"
        - $ref: "#/components/schemas/WorkflowConfiguration"
    WorkflowUpdateRequest:
      type: object
      properties:
        name:
          type: string
          description: New workflow name
          minLength: 1
          maxLength: 255
        description:
          type: string
          description: New workflow description
          maxLength: 1000
        data_input_config:
          $ref: "#/components/schemas/WorkflowDataInputConfiguration"
          description: |
            Updated data input configuration.
            If provided, creates a new version with new data retrieval settings.
        actions:
          type: object
          description: |
            Updated actions configuration. Map of action ID to action configuration.
          additionalProperties:
            $ref: "#/components/schemas/WorkflowActionConfiguration"
        starting_actions:
          type: array
          description: |
            IDs of actions to execute first after data input completes.
            Enables tree-based execution where only these actions start initially,
            and child actions are triggered via the children field.
          items:
            type: string
    WorkflowConfiguration:
      type: object
      required:
        - id
        - workflow_id
        - org_id
        - version
        - data_input_config
        - actions
        - created_by
        - created_at
        - is_latest
      properties:
        id:
          type: string
          description: Unique configuration identifier
        workflow_id:
          type: string
          description: Parent workflow ID
        org_id:
          type: string
          description: Organization ID
        version:
          type: integer
          description: Configuration version number
          minimum: 1
        data_input_config:
          $ref: "#/components/schemas/WorkflowDataInputConfiguration"
          description: |
            Configuration for retrieving and filtering data that triggers workflow actions.
             Defines what data to query and how to filter it.
        actions:
          type: object
          description: |
            Actions configuration. Map of action ID to action configuration.
          additionalProperties:
            $ref: "#/components/schemas/WorkflowActionConfiguration"
        starting_actions:
          type: array
          description: |
            IDs of actions to execute first (after data input).
          items:
            type: string
        schedule:
          type: string
          description: |
            Optional cron expression (5-field, UTC). When non-empty, the
            workflow is registered with the scheduler and fires on each tick
            (cron parser: github.com/hashicorp/cronexpr). Must be empty when
            `data_input_config.type` is `lifecycle` — lifecycle workflows are
            event-driven and cannot be scheduled.
          example: 0 9 * * *
        created_by:
          type: string
          description: User ID who created this version
        created_at:
          type: string
          format: date-time
          description: Version creation timestamp
        is_latest:
          type: boolean
          description: Whether this is the latest version
    WorkflowCypherPreviewRequest:
      type: object
      required:
        - query
      properties:
        query:
          type: string
          minLength: 1
          maxLength: 10000
          description: Read-only Cypher query to execute against the org's graph.
          example: MATCH (u:User) WHERE u.active = true RETURN u.id, u.email
        parameters:
          type: object
          additionalProperties: true
          description: Parameters bound into the query (same as scheduled config).
    WorkflowCypherPreviewResponse:
      type: object
      required:
        - columns
        - rows
        - duration_ms
        - truncated
      properties:
        columns:
          type: array
          items:
            type: string
          description: Column names in declared order.
        rows:
          type: array
          items:
            type: array
            items: {}
          description: Row values, parallel to `columns`. Cell values are arbitrary JSON.
        duration_ms:
          type: integer
          minimum: 0
          description: Server-measured query duration in milliseconds.
        truncated:
          type: boolean
          description: True when the query returned more than the preview cap (50 rows).
    WorkflowCypherPreviewError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Stable error code (see backend cypher validator sentinels).
          example: cypher_write_keyword
        message:
          type: string
          description: Human-readable detail. May reference server-side context.
    SuperAdminCreateReq:
