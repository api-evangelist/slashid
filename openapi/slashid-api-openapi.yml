                          versions:
                            type: array
                            items:
                              $ref: "#/components/schemas/WorkflowConfiguration"
                        required:
                          - versions
                    required:
                      - result
        "404":
          $ref: "#/components/responses/NotFound"
  "/workflows/{workflow_id}/versions/{version}":
    parameters:
      - name: workflow_id
        in: path
        required: true
        description: Workflow identifier
        schema:
          type: string
      - name: version
        in: path
        required: true
        description: Workflow version number
        schema:
          type: integer
          minimum: 1
      - $ref: "#/components/parameters/OrgIDHeader"
    get:
      operationId: GetWorkflowsWorkflowIdVersionsVersion
      x-rbac-enabled: true
      x-rbac-allowed-groups: admin,member
      tags:
        - Workflows
      summary: Get specific workflow version
      description: Retrieve a specific version of a workflow
      responses:
        "200":
          description: Workflow version details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponseBase"
                  - type: object
                    properties:
                      result:
                        $ref: "#/components/schemas/WorkflowConfiguration"
                    required:
                      - result
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      operationId: PostWorkflowsWorkflowIdVersionsVersionRestore
      x-rbac-enabled: true
      x-rbac-allowed-groups: admin
      tags:
        - Workflows
      summary: Restore workflow version
      description: Restore a previous version of a workflow as the latest version
      responses:
        "200":
          description: Workflow version restored successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponseBase"
                  - type: object
                    properties:
                      result:
                        $ref: "#/components/schemas/WorkflowConfiguration"
                    required:
                      - result
        "404":
          $ref: "#/components/responses/NotFound"
  "/workflows/{workflow_id}/activate":
    parameters:
      - name: workflow_id
        in: path
        required: true
        description: Workflow identifier
        schema:
          type: string
      - $ref: "#/components/parameters/OrgIDHeader"
    post:
      operationId: PostWorkflowsWorkflowIdActivate
      x-rbac-enabled: true
      x-rbac-allowed-groups: admin
      tags:
        - Workflows
      summary: Activate workflow
      description: Activate a workflow to make it operational
      responses:
        "204":
          description: Workflow activated successfully
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  "/workflows/{workflow_id}/pause":
    parameters:
      - name: workflow_id
        in: path
        required: true
        description: Workflow identifier
        schema:
          type: string
      - $ref: "#/components/parameters/OrgIDHeader"
    post:
      operationId: PostWorkflowsWorkflowIdPause
      x-rbac-enabled: true
      x-rbac-allowed-groups: admin
      tags:
        - Workflows
      summary: Pause workflow
      description: Pause an active workflow
      responses:
        "204":
          description: Workflow paused successfully
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  "/workflows/{workflow_id}/resume":
    parameters:
      - name: workflow_id
        in: path
        required: true
        description: Workflow identifier
        schema:
          type: string
      - $ref: "#/components/parameters/OrgIDHeader"
    post:
      operationId: PostWorkflowsWorkflowIdResume
      x-rbac-enabled: true
      x-rbac-allowed-groups: admin
      tags:
        - Workflows
      summary: Resume workflow
      description: Resume a paused workflow
      responses:
        "204":
          description: Workflow resumed successfully
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  "/workflows/{workflow_id}/execute":
    parameters:
      - name: workflow_id
        in: path
        required: true
        description: Workflow identifier
        schema:
          type: string
      - $ref: "#/components/parameters/OrgIDHeader"
    post:
      operationId: PostWorkflowsWorkflowIdExecute
      x-rbac-enabled: true
      x-rbac-allowed-groups: admin
      tags:
        - Workflows
      summary: Execute workflow
      description: Manually trigger workflow execution
      responses:
        "204":
          description: Workflow execution triggered successfully
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  "/workflows/{workflow_id}/scheduled-execute":
    parameters:
      - name: workflow_id
        in: path
        required: true
        description: Workflow identifier
        schema:
          type: string
      - $ref: "#/components/parameters/OrgIDHeader"
    post:
      operationId: PostWorkflowsWorkflowIdScheduledExecute
      tags:
        - Workflows
      summary: Internal endpoint for scheduled workflow execution
      description: |
        Internal endpoint invoked by the workflow scheduler (GCP Cloud Scheduler in production, the docker-scheduler in dev) on each cron tick. Publishes a workflow execute event with trigger_source=scheduled. Not intended for external callers.
      responses:
        "200":
          description: Tick accepted (or skipped if the workflow is not active)
          content:
            application/json:
              schema:
                type: object
                properties:
                  skipped:
                    type: string
                  status:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /workflows/cypher-preview:
    parameters:
      - $ref: "#/components/parameters/OrgIDHeader"
    post:
      operationId: PostWorkflowsCypherPreview
      tags:
        - Workflows
      x-rbac-enabled: true
      x-rbac-allowed-groups: admin
      summary: Run a read-only Cypher query and return the first 50 rows
      description: |
        Synchronous preview for the Query Workflows UI. Validates the query
        (same validator as scheduled runs), runs it against the caller's org
        graph with a 10-second timeout and a hard 50-row cap. Read-only —
        write keywords are rejected. Not intended for batch use; use the
        scheduled-execute path for production reads.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkflowCypherPreviewRequest"
      responses:
        "200":
          description: Preview results.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowCypherPreviewResponse"
        "400":
          description: Validation error (query empty, missing MATCH/RETURN, write keyword, etc.).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowCypherPreviewError"
        "504":
          description: Query exceeded the 10-second preview timeout.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowCypherPreviewError"
  /super-admins:
    parameters:
      - $ref: "#/components/parameters/OrgIDHeader"
    post:
      operationId: PostSuperAdmins
      x-super-admin: true
      tags:
        - Super Admin Management
      summary: Create a super-admin
      description: |
        Add a person to the super-admins table. Only existing super-admins can create new super-admins. The person must already exist in the system.
      requestBody:
        description: Super-admin creation request
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SuperAdminCreateReq"
      responses:
        "201":
          description: Super-admin created successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponseBase"
                  - type: object
                    properties:
                      result:
                        $ref: "#/components/schemas/SuperAdmin"
                    required:
                      - result
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
    get:
      operationId: GetSuperAdmins
      x-super-admin: true
      tags:
        - Super Admin Management
      summary: List all super-admins
      description: Retrieve a list of all super-admins in the system. Only super-admins can view this list
      responses:
        "200":
          description: List of super-admins
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponseBase"
                  - type: object
                    properties:
                      result:
                        type: array
                        items:
                          $ref: "#/components/schemas/SuperAdmin"
                    required:
                      - result
        "403":
          $ref: "#/components/responses/Forbidden"
  "/super-admins/{person_id}":
    parameters:
      - name: person_id
        in: path
        required: true
        description: External person ID (UUID)
        schema:
          type: string
          format: uuid
      - $ref: "#/components/parameters/OrgIDHeader"
    delete:
      operationId: DeleteSuperAdminsPersonId
      x-super-admin: true
      tags:
        - Super Admin Management
      summary: Remove super-admin access
      description: |
        Remove a person from the super-admins table by their external person ID. Only existing super-admins can revoke super-admin access.
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /super-admins/audit-logs:
    parameters:
      - $ref: "#/components/parameters/OrgIDHeader"
      - name: limit
        in: query
        description: Maximum number of audit log entries to return
        schema:
          type: integer
          default: 100
          minimum: 1
          maximum: 1000
      - name: offset
        in: query
        description: Number of audit log entries to skip
        schema:
          type: integer
          default: 0
          minimum: 0
      - name: person_id
        in: query
        description: Filter by super-admin person ID
        schema:
          type: string
          format: uuid
      - name: organization_id
        in: query
        description: Filter by organization ID
        schema:
          type: string
          format: uuid
    get:
      operationId: GetSuperAdminsAuditLogs
      x-super-admin: true
      tags:
        - Super Admin Management
      summary: Get super-admin audit logs
      description: |
        Retrieve audit logs of super-admin actions. Only super-admins can view audit logs.
      responses:
        "200":
          description: List of audit log entries
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponseBase"
                  - type: object
                    properties:
                      result:
                        type: array
                        items:
                          $ref: "#/components/schemas/SuperAdminAuditLog"
                      meta:
                        $ref: "#/components/schemas/APIMeta"
                    required:
                      - result
        "403":
          $ref: "#/components/responses/Forbidden"
