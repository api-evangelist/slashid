  /organizations/webhooks:
    parameters:
      - $ref: "#/components/parameters/OrgIDHeader"
    post:
      operationId: PostOrganizationsWebhooks
      x-rbac-enabled: true
      x-rbac-allowed-groups: admin
      tags:
        - Identity Management
        - Organization Webhooks
      summary: Create a new webhook
      description: |
        Create a new webhook for your organization. Webhooks will be called in response to triggers, and you can use
        the `/organizations/webhooks/{webhook_id}/triggers` endpoint to specify which trigger(s) should call each
        webhook.

        The request body must contain the target URL for the webhook, and this must be unique for your organization
        (you cannot have two webhooks with the same target URL). The target URL must use the HTTPS protocol, and must
        have a host. The host cannot be `localhost` or an IP address. The target URL may have a path element, but may
        not contain query parameters or fragments.

        Additionally, you can specify custom headers that will be sent in the HTTP header of each request to your
        webhook's target URL. These are encrypted when stored, so can be used for sensitive data.

        You can also choose the webhook's timeout value. This will determine how long your webhook server has to respond
        to a request before it is considered failed. If you do not set a value, defaults will be used: for synchronous
        webhook calls, this is 2 seconds; for asynchronous calls, 10 seconds. When choosing a timeout, you should
        consider how long your webhook will typically need to process a request, and how this may affect user experience
        (in the case of sychronous webhooks).
        The value provided should be a string that can be parsed as a [Golang `time.Duration`](https://pkg.go.dev/time#Duration);
        for example, "10s", "500ms". The timeout may not be more than 20 seconds, and cannot be negative.
        If you do not set a timeout, when retrieving the webhook you will see a timeout set to 0s, indicating that the
        defaults will be used when the webhook is called.

        You may also specify a name and description for the webhook.

        The response will contain a webhook ID, which uniquely identifies the newly created webhook. This ID can
        be used to modify or delete the webhook, and to add triggers for it.

        For more information on using webhooks with SlashID, see our [dedicated guide](/docs/access/guides/webhooks).
      parameters:
        - $ref: "#/components/parameters/RequiredConsistencyHeader"
        - $ref: "#/components/parameters/RequiredConsistencyTimeoutHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookPostRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponseBase"
                  - type: object
                    properties:
                      result:
                        $ref: "#/components/schemas/WebhookPostResponse"
                    required:
                      - result
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    get:
      operationId: GetOrganizationsWebhooks
      x-rbac-enabled: true
      x-rbac-allowed-groups: admin,member
      x-manager-rbac-allowed-groups: admin,member
      tags:
        - Identity Management
        - Organization Webhooks
      summary: List all webhooks
      description: Retrieve a list of all webhooks for your organization.
      responses:
        "200":
          description: OK
