    OAuthAppleProviderOptions:
      type: object
      description: See https://developer.apple.com/documentation/accountorganizationaldatasharing/creating-a-client-secret
      required:
        - private_key
        - team_id
        - key_id
        - secret_lifetime
      properties:
        authorize_scopes:
          type: array
          items:
            type: string
          default:
            - openid
