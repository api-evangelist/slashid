      properties:
        client_id:
          $ref: "#/components/schemas/OAuthClientID"
        client_secret:
          type: string
        provider:
          $ref: "#/components/schemas/OAuthProvider"
        label:
          type: string
        external_cred:
          $ref: "#/components/schemas/ExternalCredID"
          deprecated: true
        external_cred_id:
          $ref: "#/components/schemas/ExternalCredID"
        enable_in_slashid_oidc_authz_server:
          type: boolean
          description: Indicates whether these credentials can be used for SSO authentication during an OIDC flow in which SlashID acts as the Authorization Server.
        options:
          $ref: "#/components/schemas/OAuthProvidersOptions"
    OAuthCredentialPatchRequest:
      type: object
      description: Request to modify an existing OAuth credential
      properties:
        client_secret:
          type: string
        label:
          type: string
        external_cred:
          $ref: "#/components/schemas/ExternalCredID"
          deprecated: true
        external_cred_id:
          $ref: "#/components/schemas/ExternalCredID"
        options:
          $ref: "#/components/schemas/OAuthProvidersOptions"
        enable_in_slashid_oidc_authz_server:
          type: boolean
          description: Indicates whether these credentials can be used for SSO authentication during an OIDC flow in which SlashID acts as the Authorization Server.
    OrganizationResponse:
      allOf:
        - $ref: "#/components/schemas/Organization"
        - type: object
          required:
            - persons_pool_org_ids
            - group_pool_org_ids
          properties:
            parent_id:
              description: The ID of the parent organization.
              $ref: "#/components/schemas/OrganizationID"
            persons_pool_org_ids:
              description: The list of organizations or suborganizations that share user identities with this organization
              type: array
              items:
                $ref: "#/components/schemas/OrganizationID"
            group_pool_org_ids:
              description: The list of organizations or suborganizations that share user groups with this organization
              type: array
              items:
                $ref: "#/components/schemas/OrganizationID"
            inherits_rbac_pools:
              type: boolean
    OrganizationID:
      type: string
    SuborganizationCreateRequest:
      type: object
      properties:
        sub_org_name:
          type: string
        admins:
          type: array
          items:
            $ref: "#/components/schemas/PersonHandle"
        persons_org_id:
          $ref: "#/components/schemas/OrganizationID"
        groups_org_id:
          $ref: "#/components/schemas/OrganizationID"
        inherit_rbac_pools:
          type: boolean
          description: |
            This setting determines how permissions and roles are managed for a suborganization.
            When `inherit_rbac_pools` is set to false: - The suborganization has its own independent permissions and roles. - Permissions and roles can be fully customized for this suborganization.
            When `inherit_rbac_pools` is set to true: - Permissions:
              - Inherited from the nearest ancestor with 'inherit_rbac_pools' set to false.
              - Read-only for this suborganization.
              - Cannot be modified within this suborganization.

            - Roles:
              - Scoped to each organization, including this suborganization.
              - Visible across all organizations within the inheritance pool.
              - Roles from other organizations can be assigned to users in this suborganization.

            Note: - Individual role and permission assignments are not inherited. - This setting cannot be changed after the suborganization is created.
      required:
        - sub_org_name
        - admins
    OrganizationCreateResponse:
      allOf:
        - $ref: "#/components/schemas/Organization"
        - type: object
          required:
            - api_key
          properties:
            api_key:
              $ref: "#/components/schemas/Bytes"
    OrganizationsPutAPIKeyResponse:
      type: object
      required:
        - api_key
      properties:
        api_key:
          type: string
    OrganizationConfig:
      type: object
      description: Configuration values for an organization. Note that some values are read-only.
      properties:
        pricing_tier:
          $ref: "#/components/schemas/PricingTier"
        from_email:
          type: string
          description: |
            The email address from which authentication emails are sent.

            Empty means SlashID's default e-mail address will be used.

            This is set during onboarding.
        from_phone_number_sms:
          type: string
          description: |
            The phone number from which authentication SMS messages are sent.

            Empty means SlashID's default phone numbers will be used.

            This is set during onboarding.
        token_duration:
          type: integer
          description: The number of seconds before a token expires.
        groups_claim_name:
          type: string
          description: The name of the JWT claim holding the list of groups for the authenticated user identified in the token.
          example: dev.slashid.groups
        requires_manual_approval:
          type: boolean
          description: If true, new users are deactivated until the organization admin sets the person's `active` field.
        deny_self_registration:
          type: boolean
          description: If true, new users can only be created by the organization admin
        allowed_factor_methods:
          type: array
          description: |
            Only allow authentication using the specified factor methods.

            Empty means all supported factors are enabled.

            This configuration doesn't affect API and DirectID authentications.
          example:
            - sms_link
            - email_link
            - webauthn
          items:
            $ref: "#/components/schemas/FactorMethod"
        authn_link_allowed_redirect_uris:
          type: array
          maxItems: 8
          description: |
            The URIs to which users can be redirected after authenticating with an email/SMS link.

            It can't be an IP, nor contain query parameters or fragments. We advise that it's an
            HTTPS URI but we don't require it. Custom schemes are allowed.
          example:
            - https://slashid.com
            - http://localhost:8080/a-path
            - com.slashid://example
          items:
            type: string
        new_person_handle_patterns:
          type: array
          description: Only allow registration of new persons with a handle matching one of the patterns.
          example:
            - "*@example.com"
            - +1*
          items:
            $ref: "#/components/schemas/GlobPattern"
        sudo_mode_duration:
          type: integer
          description: The number of seconds, after users authenticate, during which they can perform sensitive actions.
        authn_redirect_page_ui_config:
          $ref: "#/components/schemas/AuthnRedirectPageUIConfig"
        canonical_identity_ai_matching_enabled:
          type: boolean
          description: |
            If true (default), uses AI-based matching for canonical identities which provides
            higher accuracy through fuzzy matching and semantic analysis.
            If false, uses deterministic field-level matching based on exact email/identifier matches,
            which may result in more missed matches and require more manual management.
          default: true
      required:
        - from_email
        - from_phone_number_sms
        - token_duration
        - groups_claim_name
        - requires_manual_approval
        - deny_self_registration
        - allowed_factor_methods
        - authn_link_allowed_redirect_uris
        - new_person_handle_patterns
        - sudo_mode_duration
    OrganizationConfigPatchRequest:
      type: object
      description: Request for updating organization configuration values.
      properties:
        token_duration:
          type: integer
          description: The number of seconds before a token expires
        groups_claim_name:
          type: string
          description: The name of the JWT claim holding the list of groups for the authenticated user identified in the token
          example: dev.slashid.groups
        requires_manual_approval:
          type: boolean
          description: If true, new users are deactivated until the organization admin sets the person's `active` field.
        deny_self_registration:
          type: boolean
          description: If true, new users can only be created by the organization admin
        allowed_factor_methods:
          type: array
          description: |
            Only allow authentication using the specified factor methods.

            Empty means all supported factors are enabled.

            This configuration doesn't affect API and DirectID authentications.
          example:
            - sms_link
            - email_link
            - webauthn
          items:
            $ref: "#/components/schemas/FactorMethod"
        authn_link_allowed_redirect_uris:
          type: array
          description: |
            The URIs to where users can be redirected after authenticating with an email/SMS link.
          items:
            type: string
        new_person_handle_patterns:
          type: array
          description: Only allow registration of new persons with a handle matching one of the patterns
          example:
            - "*@example.com"
            - +1*
          items:
            $ref: "#/components/schemas/GlobPattern"
        sudo_mode_duration:
          type: integer
          description: The number of seconds, after users authenticate, during which they can perform sensitive actions. Negative values will revert this property to its default (15 minutes).
        authn_redirect_page_ui_config:
          $ref: "#/components/schemas/AuthnRedirectPageUIConfig"
        canonical_identity_ai_matching_enabled:
          type: boolean
          description: |
            Enable or disable AI-based canonical identity matching.
            When disabled, falls back to deterministic field-level matching.
    PricingTierConstraints:
      type: object
      description: |
        Details of the constraints applied to a specific pricing tier.
      required:
        - name
        - custom_templates_allowed
        - nhi_external_connections_allowed
      properties:
        name:
          $ref: "#/components/schemas/PricingTier"
        custom_templates_allowed:
          description: Indicates if custom email and SMS message templates are allowed
          type: boolean
        nhi_external_connections_allowed:
          description: Indicates if external connections to non-human identity sources are allowed
          type: boolean
        max_suborganizations:
          description: Indicates the maximum number of the suborganizations in the hierarchy, not including the root organization. `null` indicates no limit.
          type: integer
          format: int64
        max_persons:
          description: Indicates the maximum number of persons allowed, including all suborganizations in the hierarchy. `null` indicates no limit.
          type: integer
          format: int64
        max_groups:
          description: Indicates the maximum number of groups allowed, including all suborganizations in the hierarchy. `null` indicates no limit.
          type: integer
          format: int64
    OrganizationUsageDetails:
