    WorkflowDataInputDetectionConfiguration:
      type: object
      required:
        - type
        - scim_filter
      properties:
        type:
          type: string
          enum:
            - detection
          description: Data input type discriminator
        scim_filter:
          type: string
          description: |
            SCIM filter string to apply when querying detections.
            Examples:
              - `severity eq "critical"`
              - `type eq "aws_identity_unused" and status eq "new"`
              - `entity_type eq "aws_iam_user"`
              - `severity eq "critical" or severity eq "high"`
          minLength: 1
          example: severity eq "critical"
        limit:
          type: integer
          description: Maximum number of detections to retrieve (0 for no limit)
          default: 0
          minimum: 0
          maximum: 10000
        sorting:
          type: array
          description: Sorting configuration for results
          items:
            type: object
            required:
              - field
              - direction
            properties:
              field:
                type: string
                description: Field to sort by
                example: created_at
              direction:
                type: string
                enum:
                  - asc
                  - desc
                description: Sort direction
                default: desc
    WorkflowDataInputLifecycleConfiguration:
      type: object
      required:
        - type
        - event_types
      properties:
        type:
          type: string
          enum:
            - lifecycle
          description: Data input type discriminator
        event_types:
          type: array
          items:
            $ref: "#/components/schemas/LifecycleEventType"
          minItems: 1
          description: Lifecycle events that trigger this workflow
          example:
            - created
            - deleted
        entity_types:
          type: array
          items:
            type: string
          description: Filter by entity types (e.g., aws_iam_user, entra_user). If empty, all entity types are matched.
          example:
            - aws_iam_user
            - entra_user
        source_types:
          type: array
          items:
            type: string
          description: Filter by identity source types (e.g., aws_account, entra). If empty, all source types are matched.
          example:
            - aws_account
            - entra
        connection_ids:
          type: array
          items:
            type: string
          description: Filter by specific connection IDs. If empty, all connections are matched.
        min_risk_score:
          type: integer
          minimum: 0
          maximum: 100
          description: Only trigger for entities with risk score >= this value
        max_risk_score:
          type: integer
          minimum: 0
          maximum: 100
          description: Only trigger for entities with risk score <= this value
        include_relationships:
          type: boolean
          default: false
          description: Fetch manager, groups, direct reports from Neo4j
        include_permissions:
          type: boolean
          default: false
          description: Fetch permission assignments from Neo4j
        include_access_history:
          type: boolean
          default: false
          description: Fetch recent access records from Neo4j
        relationship_depth:
          type: integer
          minimum: 0
          maximum: 3
          default: 1
          description: How deep to traverse relationships in Neo4j (default 1, max 3)
        scim_filter:
          type: string
          description: Additional SCIM-style filter criteria for the entity
    WorkflowDataInputUarFindingConfiguration:
      type: object
      required:
        - type
      description: |
        Filters which UarFindingV1 events this workflow should run on.
        In v1 the only emitted trigger is `manual`; other trigger values
        (decision_revoked, decision_effective, level_completed,
        campaign_completed) are accepted for forward-compat with the
        auto-trigger work but never match an event until those triggers
        ship. Backed by
        backend/modules/workflows/entities/workflow_data_input_uar_finding_configuration.go.
      properties:
        type:
          type: string
          enum:
            - uar_finding
          description: Data input type discriminator
        triggers:
          type: array
          items:
            type: string
          description: |
            UarFindingV1 trigger reasons that fire this workflow (ANY
            match). Defaults to `["manual"]` when empty.
        campaign_ids:
          type: array
          items:
            type: string
            format: uuid
          description: Filter by specific campaign IDs. Empty matches all.
        campaign_template_ids:
          type: array
          items:
            type: string
            format: uuid
          description: Filter by campaign template IDs. Empty matches all.
        campaign_types:
          type: array
          items:
            type: string
          description: |
            Filter by campaign type (e.g. `user`, `resource`,
            `non_human_identity`). Empty matches all.
        classification_tags:
          type: array
          items:
            type: string
          description: Filter by classification tags on the finding. Empty matches all.
        outcomes:
          type: array
          items:
            type: string
          description: Filter by reviewer decision outcome (e.g. `approve`, `revoke`). Empty matches all.
        only_effective:
          type: boolean
          default: false
          description: |
            Match only when `effective_outcome == outcome` — the decision
            survived multi-tier escalation rather than being overridden.
        min_level:
          type: integer
          minimum: 0
          description: Filter by decision level >= this value.
        only_high_privilege:
          type: boolean
          default: false
          description: Restrict to findings flagged as high-privilege.
        user_source_types:
          type: array
          items:
            type: string
          description: Filter by user identity source type. Empty matches all.
        user_entity_types:
          type: array
          items:
            type: string
          description: Filter by user entity type. Empty matches all.
        asset_source_types:
          type: array
          items:
            type: string
          description: Filter by asset source type. Empty matches all.
        asset_entity_types:
          type: array
          items:
            type: string
          description: Filter by asset entity type. Empty matches all.
        granting_entity_types:
          type: array
          items:
            type: string
          description: Filter by granting entity type (e.g. role, group). Empty matches all.
        scim_filter:
          type: string
          description: |
            Optional SCIM-style filter over the flattened finding payload,
            applied after the structured filters above.
    WorkflowDataInputCypherConfiguration:
      type: object
      required:
        - type
        - query
      properties:
        type:
          type: string
          enum:
            - cypher_query
          description: Data input type discriminator
        query:
          type: string
          description: |
            Read-only Cypher query whose rows feed downstream workflow actions.
            Must contain MATCH and RETURN clauses. Write operations and the
            USE clause are rejected by the validator. Comments and strings are
            tokenized before validation, so a write keyword inside a string
            literal is allowed.
          minLength: 1
          maxLength: 10000
          example: MATCH (u:User) WHERE u.active = true RETURN u.id, u.email
        parameters:
          type: object
          additionalProperties: true
          description: |
            Parameters bound into the query at execution time. Keys must match
            the `$name` placeholders in `query`. Values are passed verbatim to
            the Neo4j driver.
          example:
            min_age: 7
        max_rows:
          type: integer
          description: |
            Maximum rows returned by a scheduled execution (NOT the preview).
            Capped server-side at 10000.
          default: 1000
          minimum: 1
          maximum: 10000
        timeout_seconds:
          type: integer
          description: |
            Per-execution query timeout (NOT the preview). Capped server-side
            at 300.
          default: 30
          minimum: 1
          maximum: 300
        on_limit_exceeded:
          type: string
          enum:
            - fail
            - truncate
          default: fail
          description: |
            Behavior when the query returns more than `max_rows`. `fail` aborts
            the execution with an error; `truncate` returns the first
            `max_rows` rows and marks the execution as truncated.
        primary_entity_column:
          type: string
          description: |
            Optional. Name of a query result column whose value is the primary
            entity ID for each row. When set, downstream remediation actions
            can target this entity. Must match one of the column aliases in
            the query's RETURN clause.
          example: u.id
