    APIMeta:
      type: object
      properties:
        pagination:
          $ref: "#/components/schemas/APIPagination"
        cursor_pagination:
          $ref: "#/components/schemas/APICursorPagination"
    SAMLProviderCredentialsID:
      type: string
    PersonFieldName:
      type: string
      enum:
        - handles
        - groups
        - attributes
    GroupName:
      type: string
      pattern: ^[A-Za-z0-9]{1}[\w\.\-]*[A-Za-z0-9]$
      maxLength: 100
    PermissionName:
      type: string
      pattern: ^[A-Za-z0-9]{1}[\w./\\\-:]*[A-Za-z0-9]$
      description: |
        The permission name must be unique within your organization; is case-sensitive; and must conform to the following:
          - must be at least 2 characters long
          - may be at most 1024 characters long
          - may contain only the characters `A-Z a-z 0-9 - _ . : / \`
          - must start and end with an alphanumeric character (`A-Z a-z 0-9`)
      example: billing.invoices.list
      maxLength: 1024
    RoleName:
      type: string
      pattern: ^[A-Za-z0-9]{1}[\w.\-:]*[A-Za-z0-9]$
      maxLength: 100
      description: |
        The Role name must be unique within your organization; is case-sensitive; and must conform to the following:
          - must be at least 2 characters long
          - may be at most 100 characters long
          - may contain only the characters `A-Z a-z 0-9 - _ . :`
          - must start and end with an alphanumeric character (`A-Z a-z 0-9`)

        Roles needs to have their name prefixed with `{org_id}/`.
        Organization ID is not counted to the length limit.
      example: 064b7b63-ea43-76e5-b208-1900795bc5b7/billing-viewer
    OAuthProvider:
      type: string
