        - Organization Webhooks
      summary: Delete a webhook trigger
      description: |
        Delete a trigger for a specific webhook. The webhook will no longer be called on this trigger.
        Note that for a short period after the delete request has successfully returned, triggers in flight may still cause the webhook to be called.
      parameters:
        - $ref: "#/components/parameters/RequiredConsistencyHeader"
        - $ref: "#/components/parameters/RequiredConsistencyTimeoutHeader"
        - $ref: "#/components/parameters/WebhookTriggerTypeQueryParam"
        - $ref: "#/components/parameters/WebhookTriggerNameQueryParam"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /organizations/webhooks/verification-jwks:
    parameters:
      - $ref: "#/components/parameters/OrgIDHeader"
    get:
      operationId: GetOrganizationsWebhooksVerificationJwks
      x-rbac-enabled: true
      x-rbac-allowed-groups: admin,member
      tags:
        - Identity Management
        - Organization Webhooks
      summary: Retrieve verification JWKS for webhooks
      description: |
        Endpoint to retrieve a JSON Web Key Set (JWKS) for webhook body verification.
        When SlashID calls your webhooks in response to a trigger, the body of the request is a signed and encoded JSON Web Token (JWT). The public part of the signing key can be retrieved from this endpoint and used to verify that the request body comes from SlashID, is intended for your webhook, and has not been modified.
        SlashID uses the ES256 JSON Web Algorithm (JWA), which is the Elliptic Curve Digital Signature Algorithm (ECDSA) with the P-256 curve and SHA256.
        Support for JWTs and JWKS is available for many languages - [jwt.io](https://jwt.io/libraries) maintains an extensive (but not exhaustive) list of libraries for popular languages.
        Note that this endpoint is rate-limited to 30 requests per minute per organization, with bursts of 60. It is therefore recommended that you cache the keyset locally in your webhook handlers.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JWKS"
  /oauth2/clients:
