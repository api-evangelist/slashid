          type: string
        idp_metadata_url:
          description: The SAML IdP's metadata URL.
          type: string
        email_claims:
          description: The names of the claims in the SAML response containing the users' email addresses. The first match is added to the person's set of handles.
          type: array
          items:
            type: string
          maxItems: 3
        enable_in_slashid_oidc_authz_server:
          type: boolean
          description: Indicates whether these credentials can be used for SSO authentication during an OIDC flow in which SlashID acts as the Authorization Server.
      required:
        - id
        - idp_metadata_url
    PersonID:
      type: string
      description: Person ID
      example: 064b7b63-ea43-76e5-b208-1900795bc5b7
    OIDCTokenType:
      type: string
      enum:
        - access
        - refresh
        - id
    SsoOidcTokenDetail:
      type: object
      properties:
        token:
          type: string
          description: OIDC token value
        token_type:
          $ref: "#/components/schemas/OIDCTokenType"
        expiry:
          type: string
          format: date-time
          description: Token expiry date
        provider:
          $ref: "#/components/schemas/OAuthProvider"
        client_id:
          type: string
          description: The client ID used to obtain the token
        authentication_id:
          type: string
          description: Authentication ID
        person_id:
          $ref: "#/components/schemas/PersonID"
        organization_id:
          $ref: "#/components/schemas/OrganizationID"
