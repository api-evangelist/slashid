openapi: 3.0.1
info:
  title: SlashID API
  description: |
    This is the [OpenAPI](https://www.openapis.org/) specification for communicating with the [SlashID](https://www.slashid.dev/) service.

    The latest version of the OpenAPI API spec can be fetched from [our CDN](https://cdn.slashid.com/slashid-openapi-latest.yaml).

    We recommend you use an [OpenAPI SDK generator](https://openapi.tools/#sdk) to create a client library in your programming language,
    but you can also use this documentation to make HTTP calls directly.

    > **Compatibility note**: We aim to keep wire compatibility whenever we update the API, but parts of the specification may occasionally be refactored.
      If you use an SDK generator, your code may require minor changes between versions.
  version: "1.1"
  termsOfService: https://www.slashid.dev/terms-of-use/
  contact:
    name: API Support
    email: contact@slashid.dev
components:
  securitySchemes:
    ApiKeyAuth:
      description: Authorizes the request with the organization's API Key.
      x-svc-um-api: true
      type: apiKey
      in: header
      name: SlashID-API-Key
    OAuth2ClientIdSecret:
      description: Authorizes the request with a client ID/client secret pair
      type: http
      scheme: basic
    OAuth2AccessTokenBearer:
      description: Authorizes the request with an Access Token for the current user.
      type: http
      scheme: bearer
      bearerFormat: opaque
  parameters:
    OptionalSdkVersionHeader:
      name: SlashID-SdkVersion
      in: header
      schema:
        type: string
      required: false
      description: Optional SDK version
      example: 1.4.1
    RequiredConsistencyHeader:
      name: SlashID-Required-Consistency
      in: header
      description: |
        The consistency level required for this request. If the consistency level is not achieved within the timeout, the request will fail with a 408 Request Timeout error.
        408 Request Timeout error indicates that request was not handled within the timeout, but it may still be handled after request timeout.
        Allowed values: * `local_region`: Wait while the request executes in the local region. * `all_regions`: Wait while the request executes across all regions.
        You can learn more about our replication model on our [Cross-region Replication Model](/docs/access/concepts/replication) page.
      schema:
        type: string
        enum:
          - local_region
          - all_regions
        default: local_region
    RequiredConsistencyTimeoutHeader:
      name: SlashID-Required-Consistency-Timeout
      in: header
      description: |
        The maximum amount of seconds to wait for the requested consistency level to be achieved. If the consistency level is not achieved within this time, the request will fail with a 408 Request Timeout error.
        408 Request Timeout error indicates that request was not handled within the timeout, but it may still be handled after request timeout.
        You can learn more about our replication model on our [Cross-region Replication Model](/docs/access/concepts/replication) page.
      schema:
        type: integer
        default: 30
        maximum: 120
        minimum: 1
    OrgIDHeader:
      name: SlashID-OrgID
      in: header
      schema:
        type: string
      required: true
      description: The organization ID
      example: af5fbd30-7ce7-4548-8b30-4cd59cb2aba1
    SAMLProviderCredentialsIDPathParam:
      name: saml_provider_credentials_id
      description: The SAML provider credentials ID
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/SAMLProviderCredentialsID"
    SdkVersionHeader:
      name: SlashID-SdkVersion
      in: header
      schema:
        type: string
      required: false
      description: SDK version
      example: 1.4.1
    RequiredTokenHeader:
      name: SlashID-Token
      in: header
      schema:
        type: string
      required: true
      description: A valid JWT issued by SlashID
    PersonIDPathParam:
      name: person_id
      description: The person ID
      example: 903c1ff9-f2cc-435c-b242-9d8a690fcf0a
      in: path
      required: true
      schema:
        type: string
    CredentialIDPathParam:
      name: credential_id
      description: The person's credential ID
      example: 903c1ff9-f2cc-435c-b242-9d8a690fcf0a
      in: path
      required: true
      schema:
        type: string
    AttributeBucketsQueryParam:
      in: query
      name: buckets
      description: A comma-separated list of attribute bucket names
      example:
        - person_pool-end_user_read_write,person_pool-end_user_no_access
      schema:
        type: array
        items:
          type: string
      style: form
      explode: false
    AttributeBucketNamePathParam:
      in: path
      name: bucket_name
      description: |
        The name of an attribute bucket. The bucket `end_user_read_write` exists for all organizations and is suitable for many common use cases. Please refer to our documentation for more information on attribute buckets.
      required: true
      schema:
        type: string
    AttributeNamesQueryParam:
      in: query
      name: attributes
      description: A comma-separated list of attribute names
      example:
        - address_line_1,address_line_2,city,zip_code
      schema:
        type: array
        items:
          type: string
      style: form
      explode: false
    PersonFieldsQueryParam:
      name: fields
      in: query
      description: Optional fields to include in the response
      schema:
        type: array
        items:
          $ref: "#/components/schemas/PersonFieldName"
      style: form
      explode: false
    HandlePathParam:
      name: handle
      description: |
        Handle in format [handle_type]:[handle]. Supported handle types are 'email_address', 'phone_number', and 'username'. This field should be URL-encoded.
      in: path
      required: true
      schema:
        type: string
      examples:
        email_address:
          $ref: "#/components/examples/emailHandleExample"
        phone_number:
          $ref: "#/components/examples/phoneNumberHandleExample"
        username:
          $ref: "#/components/examples/usernameHandleExample"
    IfMatchHeader:
      name: If-Match
      in: header
      description: |
        The value of the `ETag` header from the GET response. If the value of the `ETag` header from the last response does not match the value of this header, the server will respond with a `412 Precondition Failed` status code. If-Match is not required. If omitted, the server will not check the `ETag` header.
      schema:
        type: string
    GetPersonsPersonIdOrganizationsFilterQueryParam:
      in: query
      name: filter
      schema:
        type: string
      description: A filter to be applied to the result list, using the [SCIM 2.0 Filter syntax](https://www.rfc-editor.org/rfc/rfc7644#section-3.4.2.2).
      examples:
        permission_write:
          summary: Returns only persons with 'write' permission.
          value: permission eq "write"
    HandleQueryParam:
      in: query
      name: handle
      schema:
        type: string
      description: Filter by handle in format [handle_type]:[handle]. This field should be url-encoded.
      examples:
        email_address:
          $ref: "#/components/examples/emailHandleExample"
        phone_number:
          $ref: "#/components/examples/phoneNumberHandleExample"
        username:
          $ref: "#/components/examples/usernameHandleExample"
    PersonsFilterQueryParam:
      in: query
      name: filter
      schema:
        type: string
      description: A filter to be applied to the result list, using the [SCIM 2.0 Filter syntax](https://www.rfc-editor.org/rfc/rfc7644#section-3.4.2.2).
      examples:
        person_id:
          summary: Returns only the person with the specified ID
          value: person_id eq "063e2964-ea22-76a2-ae08-3a7173964ae5"
        handle_phone:
          summary: Returns only the person with the phone handle '+1 201 987-6543'
          value: handles eq "phone_number:+12019876543"
        handle_email:
          summary: Returns the person with the email handle 'john.smith@example.com'
          value: handles eq "email_address:john.smith@example.com"
        handle_username:
          summary: Returns the person with the username handle 'john_smith'
          value: handles eq "username:john_smith"
        active:
          summary: Returns only active persons
          value: active eq true
        admin_role:
          summary: Returns only persons with 'admin' role
          value: roles eq "admin"
        source_authoritative_status:
          summary: Returns only persons from a connection of a certain authoritative level (primary, secondary, none)
          value: source_authoritative_status eq "primary"
        permission_write:
          summary: Returns only persons with 'write' permission. Permission can be assigned permission on from person's role.
          value: permissions eq "write"
        additional_permission_write:
          summary: Returns only persons with 'write' permission. It works only with additionally assigned permissions.
          value: additional_permissions eq "write"
        groups_g1:
          summary: Returns only persons in the 'G1' group
          value: groups eq "G1"
        region_us:
          summary: Returns only persons located in the 'us-iowa' region
          value: region eq "us-iowa"
        region_not_us:
          summary: Returns only persons located outside of the 'us-iowa' region
          value: region ne "us-iowa"
        region_us_eu:
          summary: Returns only persons located in 'us-iowa' or 'europe-belgium' regions
          value: region eq "us-iowa" or region eq "europe-belgium"
        attribute_name:
          summary: Returns only persons with the attribute 'myconfig' (in any bucket)
          value: attributes eq "myconfig"
        attribute_prefix:
          summary: Returns only persons with the attribute names starting in 'myprefix'
          value: attributes sw "myprefix"
        attribute_bucket_and_name:
          summary: Returns only persons with the attribute 'myconfig' in the bucket 'mybucket'
          value: attribute_buckets[name eq "mybucket" and attributes eq "myconfig"]
        attribute_in_ro_buckets:
          summary: Returns only persons with any attribute in one of the user-read-only buckets
          value: attribute_buckets[end_user_permissions eq "read_only" and attributes pr]
        attribute_in_pool_buckets:
          summary: Returns only persons with any attribute in one of the person-pool scoped buckets
          value: attribute_buckets[sharing_scope eq "person_pool" and attributes pr]
    LimitQueryParam:
      in: query
      name: limit
      schema:
        type: integer
        maximum: 1000
      description: The maximum number of items to return in the result. Maximum value is 1000.
    OffsetQueryParam:
      in: query
      name: offset
      schema:
        type: integer
      description: The number of the first item to be returned in the result
    PersonIDsQueryParam:
      in: query
      name: ids
      description: A comma-separated list of person IDs
      example:
        - 064d3697-4bf6-781e-9a08-303683b8a5e6,064d3f71-475e-7ea4-9808-6b72d038a43f
      schema:
        type: array
        items:
          type: string
      style: form
      explode: false
    GroupNamePathParam:
      in: path
      required: true
      name: group_name
      schema:
        $ref: "#/components/schemas/GroupName"
      description: The name of a group
    PermissionsNamePathParam:
      in: path
      required: true
      name: permission_name
      schema:
        $ref: "#/components/schemas/PermissionName"
      description: "The name of a permission. Permission name should be URL encoded (so for example: `3b0a8f7e-f26e-4a08-8dae-4d5360a72003%2Fperm_name`)."
    RolesNamePathParam:
      in: path
      required: true
      name: role_name
      schema:
        $ref: "#/components/schemas/RoleName"
      description: "The name of a role. Role name should be URL encoded (so for example: `3b0a8f7e-f26e-4a08-8dae-4d5360a72003%2Frole_name`)."
    OAuthProviderQueryParam:
      name: oauth_provider
      in: query
      description: The name of the OAuth provider
      required: false
      schema:
        $ref: "#/components/schemas/OAuthProvider"
    OAuthClientIDPathParam:
      name: oauth_client_id
      description: An OAuth client ID
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/OAuthClientID"
    DeleteSuborganizationOptionalQueryParam:
      in: query
      name: delete_suborganizations
      schema:
        type: boolean
        description: Whether to delete suborganizations of the organization being deleted. If this option is provided a valid `confirmation_timestamp` param is also required for the operation to proceed.
      required: false
    ConfirmationTimestampQueryParam:
      in: query
      name: confirmation_timestamp
      schema:
        type: string
        description: RFC3339 timestamp. Must be between -60s and -10s from the current time to be accepted by the endpoint.
        format: date-time
      required: false
    OrganizationsFilterQueryParam:
      in: query
      name: filter
      schema:
        type: string
      description: A filter to be applied to the result list, using the [SCIM 2.0 Filter syntax](https://www.rfc-editor.org/rfc/rfc7644#section-3.4.2.2).
      examples:
        org_name_eq:
          summary: Returns only organizations named exactly "my_org"
          value: name eq "my_org"
        org_name_co:
          summary: Returns only organizations with the string "some_str" in the name
          value: name co "some_str"
        org_name_sw:
          summary: Returns only organizations with name starting in "my_prefix"
          value: name sw "my_prefix"
        org_id_eq:
          summary: Returns only the organization with the specified ID, if it exists
          value: id eq "0be15c7a-a72d-47c4-ab9a-9a88bac3416d"
        parent_org_id_eq:
          summary: Returns only organizations children of the org with the specified ID
          value: parent_org_id eq "0be15c7a-a72d-47c4-ab9a-9a88bac3416d"
    WebhookIDPathParam:
      in: path
      required: true
      name: webhook_id
      schema:
        type: string
    WebhookTriggerTypeQueryParam:
      in: query
      name: trigger_type
      description: The type of webhook trigger
      example: event
      schema:
        $ref: "#/components/schemas/TriggerType"
      required: true
    WebhookTriggerNameQueryParam:
      in: query
      name: trigger_name
      description: The webhook trigger name (for example, an event name)
      schema:
        type: string
      required: true
    ScopeQueryParam:
      in: query
      name: scope
      schema:
        type: string
      required: true
    ResponseTypeQueryParam:
      in: query
      name: response_type
      schema:
        type: string
      required: true
    ClientIDQueryParam:
      in: query
      name: client_id
      schema:
        type: string
      required: true
    RedirectURIQueryParam:
      in: query
      name: redirect_uri
      schema:
        type: string
      required: true
    StateQueryParam:
      in: query
      name: state
      schema:
        type: string
      required: false
    CodeChallengeQueryParam:
      in: query
      name: code_challenge
      schema:
        type: string
      required: false
    CodeChallengeMethodQueryParam:
      in: query
      name: code_challenge_method
      schema:
        type: string
      required: false
    ResponseModeQueryParam:
      in: query
      name: response_mode
      schema:
        type: string
      required: false
    NonceQueryParam:
      in: query
      name: nonce
      schema:
        type: string
      required: false
    DisplayQueryParam:
      in: query
      name: display
      schema:
        type: string
        enum:
          - page
      required: false
    PromptQueryParam:
      in: query
      name: prompt
      schema:
        type: string
        enum:
          - none
          - login
      required: false
    MaxAgeQueryParam:
      in: query
      name: max_age
      schema:
        type: integer
        format: int32
      required: false
    UILocalesQueryParam:
      in: query
      name: ui_locales
      schema:
        type: string
      required: false
    LoginHintQueryParam:
      in: query
      name: login_hint
      schema:
        type: string
      required: false
    ACRValuesQueryParam:
      in: query
      name: acr_values
      schema:
        type: string
      required: false
    HandleTypesQueryParam:
      in: query
      name: handle_types
      schema:
        type: string
      required: false
  schemas:
    ValidateTokenReq:
      required:
        - token
      type: object
      properties:
        token:
          $ref: "#/components/schemas/TokenText"
    APIResponseBase:
      type: object
      properties:
        meta:
          $ref: "#/components/schemas/APIMeta"
        errors:
          type: array
          items:
            $ref: "#/components/schemas/APIResponseError"
    ValidateTokenResponse:
      type: object
      required:
        - valid
      properties:
        valid:
          description: True if token is genuine and has not expired yet, false otherwise.
          type: boolean
        invalidity_reason:
          description: If the token is invalid, this field contains the reason.
          type: string
          enum:
            - invalid_token_content
            - expired
            - invalid_issuer
            - not_enough_factors
            - person_not_active
        expires_in_seconds:
          description: JWT token validity. This value is not present if the token is not valid (valid field == false).
          type: integer
        expires_at:
          description: Token expiration time in UTC. This value is not present if token is not valid (valid field == false) or expired.
          type: string
          format: date-time
    RevokeTokenReq:
      required:
        - token
      type: object
      properties:
        token:
          $ref: "#/components/schemas/TokenText"
    SAMLProviderCredentialsGetResponse:
      $ref: "#/components/schemas/SAMLProviderCredentials"
    SAMLProviderCredentialsPostRequest:
      type: object
      description: Request to create a new SAML provider credential
      properties:
        label:
          description: A friendly free-form label to help you identify this set of SAML provider credentials.
          type: string
        idp_metadata_url:
          description: The SAML IdP's metadata URL.
          type: string
        email_claims:
          description: The names of the claims in the SAML response containing the users' email addresses. The first match is added to the person's set of handles.
          type: array
          items:
            type: string
          maxItems: 3
        enable_in_slashid_oidc_authz_server:
          type: boolean
          description: Indicates whether these credentials can be used for SSO authentication during an OIDC flow in which SlashID acts as the Authorization Server.
      required:
        - idp_metadata_url
    SAMLProviderCredentialsPostResponse:
      $ref: "#/components/schemas/SAMLProviderCredentials"
    SAMLProviderCredentialsPatchRequest:
      type: object
      description: Request to modify an existing SAML provider credential
      properties:
        label:
          description: A friendly free-form label to help you identify this set of SAML provider credentials.
          type: string
        idp_metadata_url:
          description: The SAML IdP's metadata URL.
          type: string
        email_claims:
          description: The names of the claims in the SAML response containing the users' email addresses. The first match is added to the person's set of handles.
          type: array
          items:
            type: string
          maxItems: 3
        enable_in_slashid_oidc_authz_server:
          type: boolean
          description: Indicates whether these credentials can be used for SSO authentication during an OIDC flow in which SlashID acts as the Authorization Server.
    OAuthTokenRevokeReq:
      required:
        - client_id
        - token
        - token_type
      type: object
      properties:
        client_id:
          description: The client ID originally used to obtain the token from the IdP
          type: string
        token:
          description: The token to be revoked
          type: string
        token_type:
          description: The type of token being revoked, either access or refresh
          type: string
          enum:
            - access_token
            - refresh_token
    SsoOidcTokensRevokeV2Req:
      required:
        - person_id
        - authentication_id
      type: object
      properties:
        person_id:
          $ref: "#/components/schemas/PersonID"
        authentication_id:
          type: string
          description: |
            The ID of the SSO OIDC authentication that issued the OIDC token(s) to be revoked.
        token_types:
          type: array
          description: |
            The type of OIDC token being revoked.
            If not provided, all OIDC tokens matching the provided authentication ID will be revoked.
          items:
            $ref: "#/components/schemas/OIDCTokenType"
    SsoOidcTokensGetResponse:
      type: array
      items:
        $ref: "#/components/schemas/SsoOidcTokenDetail"
    SsoOidcTokensQueryReq:
      required:
        - person_id
      type: object
      properties:
        person_id:
          $ref: "#/components/schemas/PersonID"
        authentication_ids:
          type: array
          description: |
            The IDs of the SSO OIDC authentications that issued the OIDC tokens.
            If not provided, all OIDC tokens for this person matching the specified types will be returned.
          items:
            type: string
        token_types:
          type: array
          description: |
            The types of tokens to be returned.
            If not provided, all OIDC tokens for this person issued during the specified authentication(s) will be returned.
          items:
            $ref: "#/components/schemas/OIDCTokenType"
    SsoOidcTokensQueryResp:
      type: array
      items:
        $ref: "#/components/schemas/SsoOidcTokenDetail"
    PersonDirectIDReq:
      required:
        - duration_secs
      type: object
      properties:
        duration_secs:
          description: How long (in seconds) the Direct-ID should be valid for. If unspecified, it is set to your organization's default value.
          type: integer
    DirectID:
      $ref: "#/components/schemas/Bytes"
    PostMintTokenRequest:
      type: object
      properties:
        custom_claims:
          description: |
            Set of custom claims to be added to the JWT payload, as key-value pairs.
          type: object
          additionalProperties: true
          example:
            custom_attribute_1: 42
            custom_attribute_2:
              sub_attr: 24
    UserTokenText:
      type: string
    ExportedCredential:
      oneOf:
        - $ref: "#/components/schemas/ExportedPublicKeyCredential"
        - $ref: "#/components/schemas/ExportedPasswordCredential"
        - $ref: "#/components/schemas/ExportedTOTPCredential"
      discriminator:
        propertyName: type
        mapping:
          public-key: "#/components/schemas/ExportedPublicKeyCredential"
          password: "#/components/schemas/ExportedPasswordCredential"
          totp: "#/components/schemas/ExportedTOTPCredential"
    Credential:
      type: object
      oneOf:
        - $ref: "#/components/schemas/PublicKeyCredential"
        - $ref: "#/components/schemas/PasswordCredential"
        - $ref: "#/components/schemas/TOTPCredential"
      discriminator:
        propertyName: type
        mapping:
          public-key: "#/components/schemas/PublicKeyCredential"
          password: "#/components/schemas/PasswordCredential"
          totp: "#/components/schemas/TOTPCredential"
    PasswordCredential:
      type: object
      properties:
        type:
          $ref: "#/components/schemas/CredentialType"
        params:
          $ref: "#/components/schemas/PasswordCredentialParams"
        label:
          type: string
      required:
        - type
        - params
    PasswordResetPostReq:
      type: object
      properties:
        force_change:
          type: boolean
          description: Delete the existing password for a person, forcing a new password to be set before the next password authentication.
        reset_handle:
          $ref: "#/components/schemas/PersonHandle"
    PasswordRotatePostResp:
      type: object
      properties:
        new_password:
          type: string
    PatchBucketedAttributesReq:
      $ref: "#/components/schemas/BucketedAttributes"
    PutBucketedAttributesReq:
      $ref: "#/components/schemas/BucketedAttributes"
    GetBucketedAttributesResp:
      $ref: "#/components/schemas/BucketedAttributes"
    PatchAttributesReq:
      $ref: "#/components/schemas/Attributes"
    PutAttributesReq:
      $ref: "#/components/schemas/Attributes"
    GetAttributesResp:
      $ref: "#/components/schemas/Attributes"
    GDPRConsentResponse:
      type: object
      required:
        - consents
      properties:
        consents:
          type: array
          items:
            $ref: "#/components/schemas/GDPRConsent"
    GDPRConsentRequest:
      type: object
      required:
        - consent_levels
      properties:
        consent_levels:
          type: array
          items:
            $ref: "#/components/schemas/GDPRConsentLevel"
    GDPRConsentLevel:
      type: string
      enum:
        - none
        - necessary
        - analytics
        - marketing
        - retargeting
        - tracking
    PersonRet:
      type: object
      properties:
        active:
          type: boolean
          description: A flag indicating whether the person is active or not
        person_id:
          type: string
          description: The ID of the person
        person_type:
          $ref: "#/components/schemas/PersonType"
        region:
          $ref: "#/components/schemas/Region"
        handles:
          $ref: "#/components/schemas/PersonHandlesResponse"
        groups:
          $ref: "#/components/schemas/PersonGroupsResponse"
        attributes:
          $ref: "#/components/schemas/BucketedAttributes"
      required:
        - active
        - person_id
        - person_type
        - region
      description: Abridged person structure
    PersonPatchReq:
      type: object
      properties:
        active:
          type: boolean
          description: A flag indicating whether the person should be active or not
          example: true
      description: Structure to modify a person
    PersonHandlesReq:
      type: array
      items:
        $ref: "#/components/schemas/PersonHandle"
    PersonHandlesResponse:
      type: array
      items:
        $ref: "#/components/schemas/PersonHandle"
    PersonGroupsResponse:
      type: array
      items:
        $ref: "#/components/schemas/GroupName"
    PutPersonGroupsReq:
      type: object
      properties:
        groups:
          type: array
          items:
            $ref: "#/components/schemas/GroupName"
    PersonPermissionsResponse:
      type: array
      items:
        $ref: "#/components/schemas/PermissionName"
    PutPersonPermissionsRequest:
      type: object
      properties:
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/PermissionName"
      required:
        - permissions
    PersonRolesResponse:
      type: array
      items:
        $ref: "#/components/schemas/RoleName"
    PutPersonRolesRequest:
      type: object
      properties:
