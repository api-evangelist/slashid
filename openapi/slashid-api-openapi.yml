    TemplateName:
      description: |-
        Identifier for an e-mail/SMS message template

        The following templates are available for customization:
          - `email_authn_challenge`: E-mail template with magic link;
          - `email_otp_message`: E-mail template with OTP code;
          - `text_authn_challenge`: SMS template with magic link;
          - `text_otp_message`: SMS template with OTP code;
      type: string
      enum:
        - email_authn_challenge
        - email_otp_message
        - text_authn_challenge
        - text_otp_message
        - email_password_reset
        - email_password_change_notify
        - text_password_reset
        - text_password_change_notify
    MessageTemplate:
      description: Template for E-mail or SMS messages. Empty fields fall back to default value.
      type: object
      properties:
        sender_name:
          type: string
          description: Sender name (not address). Must be empty for SMS templates.
          example: SlashID
        subject:
          type: string
          description: E-mail subject. Must be empty for SMS templates.
          example: Confirm Your Login with SlashID
        body:
          type: string
          description: Message body. Must be HTML for e-mail templates and plain text for SMS
          example: Your security code is {{otp_code}}
    OrganizationDomainsPatchRequest:
      type: object
      properties:
        domains:
          type: array
          description: List of domain patterns
          items:
            $ref: "#/components/schemas/OrganizationDomainPattern"
      example:
        domains:
          - ok.com
          - "*.ok.com"
          - my?site.org
          - a[0-9].my?site.org
    TokenTemplate:
      description: Template for user tokens emitted on authentication.
      type: object
      properties:
        content:
          type: string
          description: The token claims [mustache](https://mustache.github.io/mustache.5.html) template. Must render to a valid JSON object.
          example: '{ "my_custom_org_name": "custom_prefix-{{ organization.name }}" }'
      required:
        - content
    OAuthCredentialGetResponse:
      type: object
