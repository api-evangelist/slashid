    get:
      operationId: GetOrganizationsConfigTemplates
      x-rbac-enabled: true
      x-rbac-allowed-groups: admin,member
      tags:
        - Identity Management
        - Organization Email Templates
      summary: List available templates
      description: |-
        Lists the names of all available templates for communicating with users.

        Template names can be used to retrieve the template body for your organization.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponseBase"
                  - type: object
                    properties:
                      result:
                        type: array
                        items:
                          $ref: "#/components/schemas/TemplateName"
  "/organizations/config/templates/{template_name}":
    parameters:
      - $ref: "#/components/parameters/OrgIDHeader"
      - in: path
        name: template_name
        schema:
          $ref: "#/components/schemas/TemplateName"
        required: true
        description: Name of the template to retrieve or modify
    get:
      operationId: GetOrganizationsConfigTemplatesTemplateName
      x-rbac-enabled: true
      x-rbac-allowed-groups: admin,member
      tags:
        - Identity Management
        - Organization Email Templates
      summary: Get the named template
      description: |-
        Retrieves the message template named in the path.

        If a custom template was previously created, it will be returned.
        Otherwise the default template is returned

        Likewise, any template fields were left empty during creation will be set to their default values.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/APIResponseBase"
                  - type: object
                    properties:
                      result:
                        $ref: "#/components/schemas/MessageTemplate"
                    required:
                      - result
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: PutOrganizationsConfigTemplatesTemplateName
      x-rbac-enabled: true
      x-rbac-allowed-groups: admin
      tags:
        - Identity Management
        - Organization Email Templates
      summary: Modify the named template
      description: |-
        Sets the named message template for your organization. If a template already exists it will be overwritten and cannot
        be retrieved.

        The following templates are available for customization:
          - `email_authn_challenge`: E-mail template with magic link;
          - `text_authn_challenge`: SMS template with magic link;
          - `text_otp_message`: SMS template with OTP code;
          - `email_password_reset_challenge`: E-mail template with a password reset link;
          - `text_password_reset_challenge`: SMS template with a password reset link.

        All templates must conform to the [mustache template syntax](https://mustache.github.io/mustache.5.html). The following tags are available:
          - `{{attestation_url}}`: Magic link URL (at least one of `attestation_url` and `attestation_query_string` are required on `email_authn_challenge` and `text_authn_challenge`)
          - `{{attestation_query_string}}`: Magic link URL query string (at least one of `attestation_query_string` and `attestation_url` are required on `email_authn_challenge` and `text_authn_challenge`)
          - `{{password_reset_url}}`: Password reset URL (required on `email_password_reset_challenge` and `text_password_reset_challenge`)
          - `{{otp_code}}`: OTP code (Required on `text_otp_message`)
          - `{{org_name}}`: Organization name (Optional)
          - `{{new_user}}`: `true` for new signups, false for returning users (Optional)

        Constraints:
          - Email templates:
             - Sender name must be at most 128B in size
             - Subject must be at most 128B in size
             - Body must be HTML and at most 50KB in size.
          - SMS:
             - Body must be at most 140 bytes in size.
      parameters:
        - $ref: "#/components/parameters/RequiredConsistencyHeader"
        - $ref: "#/components/parameters/RequiredConsistencyTimeoutHeader"
      requestBody:
        description: The new content of the named template
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageTemplate"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "400":
          $ref: "#/components/responses/BadRequest"
  /organizations/config/domains:
    parameters:
      - $ref: "#/components/parameters/OrgIDHeader"
    get:
      operationId: GetOrganizationsConfigDomains
      x-rbac-enabled: true
      x-rbac-allowed-groups: admin,member
      tags:
        - Identity Management
        - Organization Allowed Domains
      summary: List the allowed domains
